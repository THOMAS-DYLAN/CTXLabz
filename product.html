    function star(filled, size) {
      size = size || 20;
      return '<svg viewBox="0 0 24 24" fill="' + (filled ? 'var(--red)' : 'var(--border)') + '" width="' + size + '" height="' + size + '"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
    }

    function renderProduct(p, rating) {
      if (typeof updateProductMeta !== "undefined") updateProductMeta(p, rating);
      document.getElementById('breadcrumb-name').textContent = p.name;
      const avg = Math.round(rating.average || 0);

      content.innerHTML = '<div class="product-layout">'
        // Visual
        + '<div class="product-visual">'
        + '<div class="product-main-thumb">'
        + (p.inventory <= 0 ? '<div class="oos-overlay"><div class="oos-label">Out of Stock</div></div>' : '')
        + (p.badge ? '<div class="product-visual-badge">' + p.badge + '</div>' : '')
        + (p.images ? '<img src="' + (p.images.startsWith('http') ? p.images : './pdct img/' + p.images) + '" alt="' + p.name + '" width="280" height="280"/>' : pepperSVG(p))
        + '</div>'
        + '<div class="research-tag">⚠️ For research purposes only · Not intended for human consumption · Handle with care</div>'
        + '</div>'
        // Info
        + '<div>'
        + '<div class="product-cat-tag">' + p.category + '</div>'
        + '<h1 class="product-title">' + p.name + '</h1>'
        + '<div class="product-info-row"><span class="info-label">Rating</span>'
        + '<div style="display:flex;gap:3px">' + Array.from({length:5},(_,i)=>star(i<avg)).join('') + '</div>'
        + '<span style="font-family:var(--font-c);font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color: #666666">'
        + (rating.count === 0 ? 'No reviews' : rating.count + ' review' + (rating.count!==1?'s':'')) + '</span>'
        + '</div>'
        + '<div class="product-description">' + p.description + '</div>'
        + '<div id="hint-mount" style="display:none"></div>'
        + '<div class="product-divider"></div>'
        + '<div class="price-row"><span class="price-big">$' + Number(p.price).toFixed(2) + '</span><span class="price-note">per unit</span></div>'
        + '<div class="product-actions">'
        + '<div class="qty-control"><button class="qty-dec" onclick="changeQty(-1)">−</button><div class="qty-display" id="qty-display">1</div><button class="qty-inc" onclick="changeQty(1)">+</button></div>'
        + (p.inventory > 0
          ? '<button class="add-to-cart-btn" id="add-btn" onclick="addToCart(' + p.id + ')">Add to Cart — $' + Number(p.price).toFixed(2) + '</button>'
          : '<button class="add-to-cart-btn oos" id="add-btn" onclick="joinWaitlist(' + p.id + ',\'' + p.name.replace(/'/g,"\\'") + '\')">🔔 Notify Me When In Stock</button>')
        + '</div>'
        + '<div class="waitlist-msg" id="waitlist-msg">✓ You\'re on the waitlist — we\'ll email you when it\'s back.</div>'
        + '<div style="margin-top:22px">'
        + [['Category',p.category],['Use','Research purposes only'],['Consumption','Not for human consumption'],
           ['Status',p.inventory<=0?'Out of Stock':p.inventory<=10?'Low Stock — '+p.inventory+' left':'In Stock']
          ].map(([k,v])=>'<div class="detail-row"><div class="detail-key">'+k+'</div><div class="detail-val">'+v+'</div></div>').join('')
        + '</div>'
        + '</div>'
        + '</div>';
    }

    let qty = 1;
    window.changeQty = d => {
      const p = getProduct(productId);
      if (!p) return;
      qty = Math.max(1, Math.min(p.inventory || 0, qty + d));
      const el  = document.getElementById('qty-display');
      const btn = document.getElementById('add-btn');
      if (el) el.textContent = qty;
      if (btn && p.inventory > 0) btn.textContent = 'Add to Cart — $' + (p.price * qty).toFixed(2) + (qty > 1 ? ' (' + qty + '×)' : '');
    };

    window.addToCart = id => {
      const p     = getProduct(id);
      const toast = document.getElementById('add-toast');
      const btn   = document.getElementById('add-btn');
      if (!p) return;
      let added = 0;
      for (let i = 0; i < qty; i++) { const r = Cart.add(p); if (!r?.ok) break; added++; }
      if (added === 0) {
        toast.textContent = p.name + ' is out of stock';
        toast.style.borderLeftColor = 'var(--red)';
      } else {
        if (btn) { btn.textContent = '✓ Added'; btn.classList.add('added'); setTimeout(() => { btn.textContent = 'Add to Cart — $' + Number(p.price).toFixed(2); btn.classList.remove('added'); }, 1800); }
        toast.textContent = added + '× ' + p.name + ' added to cart';
        toast.style.borderLeftColor = 'var(--red)';
      }
      toast.classList.add('show');
      clearTimeout(toast._t);
      toast._t = setTimeout(() => toast.classList.remove('show'), 2500);
    };

    window.joinWaitlist = async (id, name) => {
      const btn = document.getElementById('add-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Adding to waitlist…'; }
      const r = await Auth.joinWaitlist(id, name);
      if (r.ok) { if (btn) btn.style.display = 'none'; document.getElementById('waitlist-msg').style.display = 'block'; }
      else if (r.err === 'already_on_waitlist') { if (btn) { btn.disabled = false; btn.textContent = '🔔 Already on Waitlist'; } }
      else { if (btn) { btn.disabled = false; btn.textContent = '🔔 Notify Me When In Stock'; } }
    };

    function renderLabReport(p) {
      if (!p.lab_report) return;
      const m = document.getElementById('lab-mount');
      m.style.display = '';
      m.innerHTML = '<div class="lab-section"><div class="lab-title">Lab Report</div><img src="./report img/' + p.lab_report + '" alt="Lab Report" class="lab-img" width="700" height="1000" loading="lazy" decoding="async"/></div>';
    }

    function renderRelated(p) {
      const others = allProducts().filter(x => x.id !== p.id && x.category === p.category && x.inventory > 0 && x.images).slice(0,6);
      if (!others.length) return;
      const m = document.getElementById('related-mount');
      m.style.display = '';
      m.innerHTML = '<div class="related-section"><div class="related-title">More <em>Research</em></div><div class="related-row">'
        + others.map(r => '<div class="related-card" onclick="location.href=\'product.html?id='+r.id+'\'">'
            + '<div class="related-thumb">' + (r.images ? '<img src="'+(r.images.startsWith('http') ? r.images : './pdct img/'+r.images)+'" alt="'+r.name+'" width="76" height="76"/>' : miniPepperSVG(r)) + '</div>'
            + '<div class="related-info"><div class="related-name">'+r.name+'</div><div class="related-price">$'+Number(r.price).toFixed(2)+'</div></div>'
            + '</div>').join('')
        + '</div></div>';
    }

    // ── Reviews — uses Auth.getReviews() and Auth.submitReview() ──
    async function renderReviews(productId, rating) {
      const panel    = document.getElementById('your-rating-panel');
      const listEl   = document.getElementById('reviews-list');
      const userStars = rating.userStars || 0;
      _formStars = userStars;

      // Star picker
      panel.innerHTML = '<div class="your-rating-panel">'
        + '<span class="rating-label">Your Rating</span>'
        + '<div style="display:flex;gap:4px">'
        + Array.from({length:5},(_,i)=>'<button class="star-btn" onmouseenter="hoverStars('+(i+1)+')" onmouseleave="resetStars()" onclick="pickStar('+(i+1)+')" id="pstar-'+(i+1)+'">'
            + star(i < userStars, 26) + '</button>').join('')
        + '</div>'
        + '<span id="rating-saved" class="rating-saved">✓ Saved</span>'
        + '<button class="review-write-btn" onclick="document.getElementById(\'review-form-wrap\').classList.toggle(\'open\')">Write a Review</button>'
        + '</div>';

      window.hoverStars = n => { for(let i=1;i<=5;i++){const s=document.getElementById('pstar-'+i);if(s)s.innerHTML=star(i<=n,26);} };
      window.resetStars = ()  => { for(let i=1;i<=5;i++){const s=document.getElementById('pstar-'+i);if(s)s.innerHTML=star(i<=_formStars,26);} };
      window.pickStar   = async n => {
        _formStars = n;
        resetStars();
        await Auth.submitReview(productId, n, '', '');
        const saved = document.getElementById('rating-saved');
        if (saved) { saved.style.display = 'block'; setTimeout(()=>saved.style.display='none', 2000); }
      };

      // Build form star picker
      const fp = document.getElementById('form-star-picker');
      if (fp) {
        let _hover = 0, _pick = 0;
        fp.innerHTML = Array.from({length:5},(_,i)=>'<button class="star-btn" id="fstar-'+(i+1)+'">'+ star(false, 24) +'</button>').join('');
        fp.querySelectorAll('button').forEach((btn, i) => {
          btn.addEventListener('mouseenter', () => { _hover=i+1; for(let j=1;j<=5;j++){const s=fp.querySelector('#fstar-'+j);if(s)s.innerHTML=star(j<=_hover,24);} });
          btn.addEventListener('mouseleave', () => { _hover=0;   for(let j=1;j<=5;j++){const s=fp.querySelector('#fstar-'+j);if(s)s.innerHTML=star(j<=_pick,24);} });
          btn.addEventListener('click',      e  => { e.preventDefault(); _pick=i+1; for(let j=1;j<=5;j++){const s=fp.querySelector('#fstar-'+j);if(s)s.innerHTML=star(j<=_pick,24);} document.getElementById('form-star-label').textContent=['','Poor','Fair','Good','Great','Excellent'][_pick]; });
        });
        fp._getPick = () => _pick;
      }

      // Reviews list — Auth.getReviews returns { rows, currentUserId }
      const { rows } = await Auth.getReviews(productId);
      if (!rows.length) {
        listEl.innerHTML = '<p style="color: #666666;font-size:.83rem;padding:16px 0">No written reviews yet. Be the first!</p>';
      } else {
        listEl.innerHTML = rows.map(r => {
          const name    = (r.username || 'Anonymous').replace(/</g,'&lt;');
          const initial = name.charAt(0).toUpperCase();
          const date    = new Date(r.updated_at).toLocaleDateString('en-US',{month:'short',year:'numeric'});
          return '<div class="review-card">'
            + '<div class="review-top">'
            +   '<div class="review-stars">' + Array.from({length:5},(_,i)=>star(i<r.stars,14)).join('') + '</div>'
            +   '<div class="review-author-inline">'
            +     '<div class="review-avatar">' + initial + '</div>'
            +     '<span class="review-username">' + name + '</span>'
            +   '</div>'
            + '</div>'
            + (r.comment ? '<p class="review-comment">' + r.comment.replace(/</g,'&lt;') + '</p>' : '')
            + '<div class="review-date">' + date + '</div>'
            + '</div>';
        }).join('');
      }
    }

    window.submitReview = async () => {
      const fp      = document.getElementById('form-star-picker');
      const stars   = fp?._getPick?.() || 0;
      const comment = document.getElementById('review-comment').value.trim();
      const username = document.getElementById('review-username').value.trim();
      const errEl   = document.getElementById('review-err');
      errEl.textContent = '';
      if (!stars) { errEl.textContent = 'Please select a star rating.'; return; }
      const r = await Auth.submitReview(productId, stars, comment, username);
      if (!r.ok) { errEl.textContent = r.err || 'Failed to submit.'; return; }
      document.getElementById('review-form-wrap').classList.remove('open');
      // Refresh
      const rating = await Auth.getProductRating(productId);
      await renderReviews(productId, rating);
    };
  
    function updateProductMeta(p, rating) {
      var title = p.name + ' Research Peptide | Buy Online | CTXLabz';
      document.title = title;
      var og = {'og:title': title, 'og:description': 'Buy ' + p.name + ' research peptide online from CTXLabz. Research-grade, fast USPS shipping. For licensed research purposes only.', 'og:url': 'https://ctxlabz.com/product.html?id=' + p.id};
      Object.entries(og).forEach(([k,v]) => { var el = document.querySelector('meta[property="'+k+'"]'); if(el) el.setAttribute('content',v); });
      var canon = document.querySelector('link[rel="canonical"]');
      if (!canon) { canon = document.createElement('link'); canon.rel = 'canonical'; document.head.appendChild(canon); }
      canon.href = 'https://ctxlabz.com/product.html?id=' + p.id;
      var ld = {"@context":"https://schema.org","@type":"Product","name":p.name + " Research Peptide","description":(p.description||("Research-grade " + p.name + " peptide for licensed research purposes only.")),"image":(p.images?"https://ctxlabz.com/pdct img/"+p.images:"https://ctxlabz.com/img/logo.png"),"category":(p.category||"Research Peptides"),"brand":{"@type":"Brand","name":"CTXLabz"},"offers":{"@type":"Offer","url":"https://ctxlabz.com/product.html?id="+p.id,"price":p.price,"priceCurrency":"USD","availability":p.inventory>0?"https://schema.org/InStock":"https://schema.org/OutOfStock","seller":{"@type":"Organization","name":"CTXLabz"}}};
      if (rating && rating.count > 0) { ld.aggregateRating = {"@type":"AggregateRating","ratingValue":rating.average,"reviewCount":rating.count}; }
      var s = document.getElementById('product-ld'); if(s) s.remove();
      s = document.createElement('script'); s.id='product-ld'; s.type='application/ld+json'; s.textContent = JSON.stringify(ld); document.head.appendChild(s);
    }

</script>
</body>
